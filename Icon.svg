<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="keyGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="96" y1="16" x2="96" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="176" y1="16" x2="176" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="336" y1="16" x2="336" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="416" y1="16" x2="416" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="96" x2="496" y2="96" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="176" x2="496" y2="176" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="336" x2="496" y2="336" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="416" x2="496" y2="416" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Keyboard body -->
  <rect x="72" y="240" width="368" height="200" rx="20" ry="20" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <!-- Top row keys -->
  <rect x="92" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="134" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="176" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="218" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="260" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="302" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="344" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>
  <rect x="386" y="260" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.9"/>

  <!-- Middle row keys -->
  <rect x="102" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="144" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="186" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="228" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="270" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="312" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>
  <rect x="354" y="300" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.85"/>

  <!-- Bottom row keys -->
  <rect x="112" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="154" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="196" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="238" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="280" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="322" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>
  <rect x="364" y="340" width="36" height="32" rx="6" fill="url(#keyGlow)" opacity="0.8"/>

  <!-- Space bar -->
  <rect x="152" y="382" width="208" height="32" rx="6" fill="url(#keyGlow)" opacity="0.75"/>

  <!-- Highlighted cmd key (active) -->
  <rect x="92" y="340" width="14" height="32" rx="4" fill="#22d3ee" opacity="0.9" filter="url(#glow)"/>

  <!-- Bar chart overlay (top area) -->
  <g filter="url(#glow)">
    <!-- Bar chart bars -->
    <rect x="120" y="148" width="28" height="72" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="160" y="108" width="28" height="112" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="200" y="128" width="28" height="92" rx="4" fill="url(#bar3)" opacity="0.9"/>
    <rect x="240" y="88" width="28" height="132" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="280" y="118" width="28" height="102" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="320" y="68" width="28" height="152" rx="4" fill="url(#bar3)" opacity="0.9"/>
    <rect x="360" y="98" width="28" height="122" rx="4" fill="url(#bar1)" opacity="0.9"/>
  </g>

  <!-- Trend line connecting bar tops -->
  <polyline points="134,148 174,108 214,128 254,88 294,118 334,68 374,98"
    fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Small dots on trend line -->
  <circle cx="134" cy="148" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="174" cy="108" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="214" cy="128" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="254" cy="88" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="294" cy="118" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="334" cy="68" r="4" fill="#f8fafc" opacity="0.8"/>
  <circle cx="374" cy="98" r="4" fill="#f8fafc" opacity="0.8"/>
</svg>
